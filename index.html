<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제품별 제조원가 통합관리 v133.8 | (주)동방파스텍</title>
<style>
  :root{--navy:#16284a;--blue:#2f6fb0;--track:#dfe6ef;--bg:#f7f9fc;--mut:#617089}
  *{box-sizing:border-box}
  html,body{width:100%;height:100%;margin:0;overflow:hidden;background:var(--bg);font-family:'Malgun Gothic','맑은 고딕',system-ui,sans-serif}
  #appFrame{position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff;opacity:0;visibility:hidden;pointer-events:none;transition:opacity .18s ease}
  #appFrame.ready{opacity:1;visibility:visible;pointer-events:auto}
  #pageLoader{position:fixed;inset:0;z-index:2147483647;display:flex;align-items:center;justify-content:center;background:var(--bg);color:var(--navy);opacity:1;visibility:visible;transition:opacity .22s ease,visibility .22s ease}
  #pageLoader.done{opacity:0;visibility:hidden;pointer-events:none}
  .loader-inner{display:flex;flex-direction:column;align-items:center;gap:14px;min-width:240px;text-align:center}
  .loader-percent{font-size:56px;line-height:1;font-weight:900;letter-spacing:-2px;font-variant-numeric:tabular-nums}
  .loader-track{width:240px;height:6px;border-radius:999px;background:var(--track);overflow:hidden}
  .loader-bar{display:block;width:0;height:100%;border-radius:inherit;background:var(--blue);transition:width .1s linear}
  .loader-label{font-size:13px;font-weight:800;color:var(--mut)}
  .loader-retry{display:none;border:1px solid #b9c7d8;border-radius:8px;background:#fff;color:var(--navy);padding:8px 14px;font-weight:800;cursor:pointer}
  .loader-retry.show{display:inline-block}
  @media(max-width:640px){.loader-percent{font-size:48px}.loader-track{width:200px}.loader-inner{min-width:200px}}
</style>
</head>
<body>
<div id="pageLoader" role="status" aria-live="polite" aria-label="프로그램 불러오는 중">
  <div class="loader-inner">
    <div class="loader-percent" id="loaderPercent">0%</div>
    <div class="loader-track" aria-hidden="true"><span class="loader-bar" id="loaderBar"></span></div>
    <div class="loader-label" id="loaderLabel">프로그램을 불러오는 중입니다</div>
    <button class="loader-retry" id="loaderRetry" type="button">다시 불러오기</button>
  </div>
</div>
<iframe id="appFrame" title="제품별 제조원가 프로그램" src="./product_app.html?v=1338" loading="eager"></iframe>
<script>
(function(){
  'use strict';
  var frame=document.getElementById('appFrame');
  var loader=document.getElementById('pageLoader');
  var percent=document.getElementById('loaderPercent');
  var bar=document.getElementById('loaderBar');
  var label=document.getElementById('loaderLabel');
  var retry=document.getElementById('loaderRetry');
  var value=0,done=false,tick=0,poll=0,timeout=0;

  function setProgress(next,text){
    next=Math.max(value,Math.min(100,Math.round(Number(next)||0)));
    value=next;
    percent.textContent=next+'%';
    bar.style.width=next+'%';
    if(text)label.textContent=text;
  }
  function showLoader(text){
    done=false;value=0;
    loader.classList.remove('done');
    frame.classList.remove('ready');
    retry.classList.remove('show');
    setProgress(0,text||'프로그램을 불러오는 중입니다');
    startProgress();
  }
  function startProgress(){
    clearInterval(tick);
    tick=setInterval(function(){
      if(done)return;
      var cap=value<70?78:94;
      var step=value<30?5:(value<65?3:1);
      setProgress(Math.min(cap,value+step),value<72?'프로그램을 불러오는 중입니다':'메인 화면을 준비하는 중입니다');
    },80);
  }
  function appReady(){
    try{
      var doc=frame.contentDocument;
      var win=frame.contentWindow;
      if(!doc||!doc.documentElement)return false;
      return doc.readyState==='complete' &&
        (doc.documentElement.classList.contains('dbf-main-ready') || win.__dbfFullLoaderReady===true);
    }catch(e){return false}
  }
  function finish(){
    if(done)return;
    done=true;clearInterval(tick);clearInterval(poll);clearTimeout(timeout);
    setProgress(100,'로딩 완료');
    setTimeout(function(){frame.classList.add('ready');loader.classList.add('done')},160);
    try{
      frame.contentWindow.addEventListener('beforeunload',function(){showLoader('프로그램을 다시 불러오는 중입니다')},{once:true});
    }catch(e){}
  }
  function waitForApp(){
    clearInterval(poll);
    poll=setInterval(function(){
      if(appReady())finish();
      else setProgress(Math.max(value,95),'데이터를 정리하는 중입니다');
    },80);
  }

  frame.addEventListener('load',function(){
    setProgress(Math.max(value,90),'메인 화면을 확인하는 중입니다');
    waitForApp();
  });
  frame.addEventListener('error',function(){
    clearInterval(tick);clearInterval(poll);
    label.textContent='프로그램 파일을 불러오지 못했습니다';
    retry.classList.add('show');
  });
  retry.addEventListener('click',function(){
    showLoader();
    frame.src='./product_app.html?v=1338&t='+Date.now();
  });

  startProgress();
  timeout=setTimeout(function(){
    if(done)return;
    if(frame.contentDocument){finish();return}
    clearInterval(tick);clearInterval(poll);
    label.textContent='로딩 시간이 길어지고 있습니다';
    retry.classList.add('show');
  },30000);
})();
</script>
</body>
</html>
